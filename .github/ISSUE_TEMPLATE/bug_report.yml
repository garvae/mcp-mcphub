name: Bug report
description: Report a reproducible defect in the MCP server
title: "[Bug] "
labels:
  - bug
  - needs-repro
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Please include enough detail to reproduce the problem without sharing real secrets.
        Do not paste tokens, cookies, client secrets, private URLs, or sensitive production logs.
  - type: input
    id: mcphub_version
    attributes:
      label: MCPHub version
      placeholder: 1.0.16
    validations:
      required: true
  - type: input
    id: package_version
    attributes:
      label: Package version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: 24.11.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - HTTP stateful
        - HTTP stateless
    validations:
      required: true
  - type: dropdown
    id: exposure_profile
    attributes:
      label: Exposure profile
      options:
        - safe
        - ops
        - admin
        - all
    validations:
      required: true
  - type: textarea
    id: feature_flags
    attributes:
      label: Relevant feature flags
      description: List any `ALLOW_*` flags, readonly settings, or unusual runtime config involved.
      placeholder: |
        ALLOW_AUTH_ADMIN_TOOLS=false
        MCP_FORCE_READONLY=true
  - type: dropdown
    id: client
    attributes:
      label: Client
      options:
        - Claude Desktop
        - Claude Code
        - Codex
        - Other
    validations:
      required: true
  - type: textarea
    id: command_or_config
    attributes:
      label: Command or client config used
      description: Remove secrets first.
      placeholder: |
        npx @garvae/mcp-mcphub stdio --exposure=safe
  - type: textarea
    id: doctor_json
    attributes:
      label: `doctor --json` output
      description: Redact secrets before pasting.
      render: json
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the server with ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or terminal output
      description: Remove secrets, cookies, private URLs, and sensitive production data first.
