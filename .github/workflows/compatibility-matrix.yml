name: compatibility-matrix

on:
  pull_request:
    paths:
      - 'src/core/compatibility/**'
      - 'src/core/coverage/**'
      - 'src/core/mcphub-client/**'
      - 'src/mcp/**'
      - 'src/transports/**'
      - 'tests/integration/**'
      - 'tests/helpers/upstream-stub.ts'
      - 'config/upstream-compatibility.json'
      - 'docs/compatibility.md'
      - 'docs/upstream-mcphub.md'
      - 'vitest.integration.config.ts'
      - '.github/workflows/compatibility-matrix.yml'
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '22.13.0'

jobs:
  matrix-config:
    runs-on: ubuntu-latest
    outputs:
      mcphub_versions: ${{ steps.read-matrix.outputs.mcphub_versions }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Read compatibility matrix versions
        id: read-matrix
        shell: bash
        run: |
          matrix_json="$(node -e "const config = require('./config/upstream-compatibility.json'); const versions = [...new Set([config.routeSnapshotBaselineVersion, config.pinnedReleaseTargetVersion, 'latest'])]; process.stdout.write(JSON.stringify(versions));")"
          echo "mcphub_versions=${matrix_json}" >> "$GITHUB_OUTPUT"

  compatibility:
    needs: matrix-config
    name: compatibility (${{ matrix.mcphub_version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        mcphub_version: ${{ fromJson(needs.matrix-config.outputs.mcphub_versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated compatibility documentation
        run: pnpm docs:compatibility:check

      - name: Run upstream compatibility matrix
        env:
          MCPHUB_COMPAT_IMAGE_TAG: ${{ matrix.mcphub_version }}
          RUN_MCPHUB_COMPAT_TESTS: '1'
        run: pnpm test:compatibility
