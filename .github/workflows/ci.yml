name: ci

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect validate-relevant changes
        id: changes
        shell: bash
        run: |
          package_json_changed_keys() {
            node -e "const { execSync } = require('node:child_process'); const base = JSON.parse(execSync('git show origin/${{ github.base_ref }}:package.json', { encoding: 'utf8' })); const head = JSON.parse(execSync('git show HEAD:package.json', { encoding: 'utf8' })); const keys = new Set([...Object.keys(base), ...Object.keys(head)]); const changed = [...keys].filter((key) => JSON.stringify(base[key]) !== JSON.stringify(head[key])); process.stdout.write(changed.join('\\n'));"
          }

          package_json_requires_validate() {
            # Only runtime/build/test-affecting top-level manifest edits should force the heavy validate job.
            package_json_changed_keys | grep -Eq '^(packageManager|type|main|types|bin|exports|engines|scripts|dependencies|devDependencies|peerDependencies|optionalDependencies)$'
          }

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|scripts/|tests/|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|tsconfig.*\.json$|vitest.*\.ts$|eslint\.config\..*$|prettier\.config\..*$|docs/compatibility\.md$|docs/api-coverage\.md$|docs/generated/|\.github/workflows/ci\.yml$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed_files" | grep -Eq '^package\.json$' && package_json_requires_validate; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '22.13.0'
          package-manager-cache: false

      - name: Install pnpm
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: npm install --global pnpm@11.7.0

      - name: Resolve pnpm store path
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-node22-pnpm11-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node22-pnpm11-store-

      - name: Install dependencies
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Run CI validation
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm ci:validate

      - name: Skip validate
        if: ${{ steps.changes.outputs.should_run != 'true' }}
        run: |
          echo "Skipping validate: no CI-relevant changes in this pull request."

  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect package-relevant changes
        id: changes
        shell: bash
        run: |
          package_json_changed_keys() {
            node -e "const { execSync } = require('node:child_process'); const base = JSON.parse(execSync('git show origin/${{ github.base_ref }}:package.json', { encoding: 'utf8' })); const head = JSON.parse(execSync('git show HEAD:package.json', { encoding: 'utf8' })); const keys = new Set([...Object.keys(base), ...Object.keys(head)]); const changed = [...keys].filter((key) => JSON.stringify(base[key]) !== JSON.stringify(head[key])); process.stdout.write(changed.join('\\n'));"
          }

          package_json_requires_runtime_package_validation() {
            # Installed-runtime smoke coverage is only needed when the executable/runtime manifest changed.
            package_json_changed_keys | grep -Eq '^(packageManager|type|main|types|bin|exports|engines|scripts|dependencies|devDependencies|peerDependencies|optionalDependencies)$'
          }

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "full_validation=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|scripts/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|tsconfig.*\.json$|README\.md$|CHANGELOG\.md$|LICENSE$|\.env\.example$|docker-compose\.example\.yml$|docs/|assets/readme/|AGENTS\.md$|\.github/workflows/ci\.yml$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|scripts/|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|tsconfig.*\.json$|\.github/workflows/ci\.yml$)'; then
            echo "full_validation=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed_files" | grep -Eq '^package\.json$' && package_json_requires_runtime_package_validation; then
            echo "full_validation=true" >> "$GITHUB_OUTPUT"
          else
            echo "full_validation=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '22.13.0'
          package-manager-cache: false

      - name: Install pnpm
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: npm install --global pnpm@11.7.0

      - name: Resolve pnpm store path
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-node22-pnpm11-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node22-pnpm11-store-

      - name: Install dependencies
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm build:clean

      - name: Create package tarball
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm pack:smoke

      - name: Audit package contents
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm pack:audit

      - name: Validate installed package runtime
        if: ${{ steps.changes.outputs.should_run == 'true' && steps.changes.outputs.full_validation == 'true' }}
        run: pnpm exec vitest run -c vitest.package.config.ts

      - name: Verify publish dry-run
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        env:
          SKIP_PREPUBLISH_GATE: '1'
        run: pnpm publish:dry-run

      - name: Skip installed-runtime smoke
        if: ${{ steps.changes.outputs.should_run == 'true' && steps.changes.outputs.full_validation != 'true' }}
        run: |
          echo "Skipping installed package runtime smoke: package-facing changes do not affect runtime manifest behavior."

      - name: Upload package tarball
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: package-tarball
          path: .artifacts/*.tgz
          include-hidden-files: true
          if-no-files-found: error

      - name: Skip package
        if: ${{ steps.changes.outputs.should_run != 'true' }}
        run: |
          echo "Skipping package: no package-facing changes in this pull request."
