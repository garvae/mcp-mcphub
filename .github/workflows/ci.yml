name: ci

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.13.0'
  PACK_ARTIFACTS_DIR: .artifacts/package

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect validate-relevant changes
        id: changes
        shell: bash
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|scripts/|tests/unit/|tests/helpers/|config/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|tsconfig.*\.json$|vitest.*\.ts$|biome\.json$|\.prettierrc\.json$|docs/api-coverage\.md$|docs/compatibility\.md$|docs/generated/|\.github/workflows/ci\.yml$|\.github/workflows/coverage\.yml$|\.github/workflows/integration\.yml$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Verify compatibility documentation
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm docs:compatibility:check

      - name: Verify coverage documentation
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm docs:coverage:check

      - name: Verify generated tool catalogs
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm docs:tools:check

      - name: Run TypeScript typecheck
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm typecheck

      - name: Run Biome lint
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm lint

      - name: Run Prettier check
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm format:check

      - name: Run fast test suite
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm test

      - name: Skip validate
        if: ${{ steps.changes.outputs.should_run != 'true' }}
        run: |
          echo "Skipping validate: no CI-relevant changes in this pull request."

  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect package-relevant changes
        id: changes
        shell: bash
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|scripts/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|tsconfig.*\.json$|README\.md$|CHANGELOG\.md$|LICENSE$|\.env\.example$|docker-compose\.example\.yml$|docs/|assets/readme/|AGENTS\.md$|\.github/workflows/ci\.yml$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm build:clean

      - name: Create package tarball
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm exec tsx scripts/audit-package.ts --pack --artifacts-dir "$PACK_ARTIFACTS_DIR"

      - name: Validate installed package runtime
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        env:
          PACK_ARTIFACTS_DIR: ${{ env.PACK_ARTIFACTS_DIR }}
        run: pnpm exec vitest run -c vitest.package.config.ts

      - name: Verify publish dry-run
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        run: pnpm publish:dry-run

      - name: Upload package tarball
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: package-tarball
          path: ${{ env.PACK_ARTIFACTS_DIR }}/*.tgz
          include-hidden-files: true
          if-no-files-found: error

      - name: Skip package
        if: ${{ steps.changes.outputs.should_run != 'true' }}
        run: |
          echo "Skipping package: no package-facing changes in this pull request."
