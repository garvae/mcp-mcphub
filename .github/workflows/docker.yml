name: docker

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.npmrc'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect Docker-relevant changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(Dockerfile$|\.dockerignore$|\.npmrc$|src/|scripts/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|tsconfig.*\.json$|biome\.json$|\.github/workflows/docker\.yml$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image locally
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        shell: bash
        run: |
          docker build \
            --file Dockerfile \
            --tag mcp-mcphub:ci \
            .

      - name: Skip Docker build
        if: ${{ steps.changes.outputs.should_run != 'true' }}
        run: |
          echo "Skipping docker build validation: no image-relevant changes in this pull request."
