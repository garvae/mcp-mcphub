name: docker

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.npmrc'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect Docker-relevant changes
        id: changes
        shell: bash
        run: |
          package_json_changed_keys() {
            node -e "const { execSync } = require('node:child_process'); const base = JSON.parse(execSync('git show origin/${{ github.base_ref }}:package.json', { encoding: 'utf8' })); const head = JSON.parse(execSync('git show HEAD:package.json', { encoding: 'utf8' })); const keys = new Set([...Object.keys(base), ...Object.keys(head)]); const changed = [...keys].filter((key) => JSON.stringify(base[key]) !== JSON.stringify(head[key])); process.stdout.write(changed.join('\\n'));"
          }

          package_json_requires_docker_build() {
            # Metadata-only package.json edits do not change the image build result in a meaningful way.
            package_json_changed_keys | grep -Eq '^(packageManager|type|main|types|bin|exports|engines|scripts|dependencies|devDependencies|peerDependencies|optionalDependencies)$'
          }

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(Dockerfile$|\.dockerignore$|\.npmrc$|src/|scripts/|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|tsconfig.*\.json$|\.github/workflows/docker\.yml$)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed_files" | grep -Eq '^package\.json$' && package_json_requires_docker_build; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image locally
        if: ${{ steps.changes.outputs.should_run == 'true' }}
        shell: bash
        run: |
          docker build \
            --file Dockerfile \
            --tag mcp-mcphub:ci \
            .

      - name: Skip Docker build
        if: ${{ steps.changes.outputs.should_run != 'true' }}
        run: |
          echo "Skipping docker build validation: no image-relevant changes in this pull request."
