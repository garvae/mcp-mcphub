name: release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the package to npm after release validation
        required: true
        default: false
        type: boolean
      run_compatibility:
        description: Run the Docker compatibility suite before publish validation
        required: true
        default: false
        type: boolean
      run_live_readonly:
        description: Run live read-only MCPHub checks when release secrets are configured
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

env:
  NODE_VERSION: '22.13.0'
  PACK_ARTIFACTS_DIR: .artifacts/release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Docker compatibility suite
        if: ${{ inputs.run_compatibility || vars.RELEASE_COMPAT_TESTS_REQUIRED == '1' }}
        env:
          MCPHUB_COMPAT_IMAGE_TAG: latest
          RUN_MCPHUB_COMPAT_TESTS: '1'
        run: pnpm test:compatibility

      - name: Skip Docker compatibility suite
        if: ${{ !(inputs.run_compatibility || vars.RELEASE_COMPAT_TESTS_REQUIRED == '1') }}
        run: echo "Skipping Docker compatibility suite."

      - name: Build clean release artifacts
        run: pnpm build:clean

      - name: Create and audit package tarball
        run: pnpm exec tsx scripts/audit-package.ts --pack --artifacts-dir "$PACK_ARTIFACTS_DIR"

      - name: Validate installed package runtime
        env:
          PACK_ARTIFACTS_DIR: ${{ env.PACK_ARTIFACTS_DIR }}
        run: pnpm exec vitest run -c vitest.package.config.ts

      - name: Run live read-only MCPHub checks
        if: ${{ inputs.run_live_readonly || vars.RELEASE_REAL_TESTS_REQUIRED == '1' }}
        env:
          REAL_TEST_HTTP_AUTH_TOKEN: ${{ secrets.REAL_TEST_HTTP_AUTH_TOKEN }}
          REAL_TEST_MCPHUB_AUTH_HEADER: ${{ secrets.REAL_TEST_MCPHUB_AUTH_HEADER }}
          REAL_TEST_MCPHUB_PROFILE: ${{ secrets.REAL_TEST_MCPHUB_PROFILE }}
          REAL_TEST_MCPHUB_TOKEN: ${{ secrets.REAL_TEST_MCPHUB_TOKEN }}
          REAL_TEST_MCPHUB_TOKEN_KIND: ${{ secrets.REAL_TEST_MCPHUB_TOKEN_KIND }}
          REAL_TEST_MCPHUB_URL: ${{ secrets.REAL_TEST_MCPHUB_URL }}
          RUN_REAL_MCPHUB_TESTS: ${{ vars.RUN_REAL_MCPHUB_TESTS }}
        run: pnpm test:real:readonly

      - name: Skip live read-only MCPHub checks
        if: ${{ !(inputs.run_live_readonly || vars.RELEASE_REAL_TESTS_REQUIRED == '1') }}
        run: echo "Skipping live read-only MCPHub checks."

      - name: Verify npm release dry-run
        run: pnpm publish:dry-run

      - name: Create release PR or publish package
        if: ${{ inputs.publish && vars.ENABLE_NPM_PUBLISH == '1' }}
        uses: changesets/action@v1
        with:
          version: pnpm version:packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish skipped
        if: ${{ !(inputs.publish && vars.ENABLE_NPM_PUBLISH == '1') }}
        run: |
          echo "Release validation completed."
          echo "Real npm publish is disabled unless workflow_dispatch publish=true and ENABLE_NPM_PUBLISH=1."
