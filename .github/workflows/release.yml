name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_compatibility:
        description: Run the Docker compatibility suite before publish validation
        required: true
        default: false
        type: boolean
      run_live_readonly:
        description: Run live read-only MCPHub checks when release secrets are configured
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

env:
  NODE_VERSION: '24'
  PACK_ARTIFACTS_DIR: .artifacts/release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify compatibility documentation
        run: pnpm docs:compatibility:check

      - name: Verify coverage documentation
        run: pnpm docs:coverage:check

      - name: Verify generated tool catalogs
        run: pnpm docs:tools:check

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Run Biome lint
        run: pnpm lint

      - name: Run Prettier check
        run: pnpm format:check

      - name: Run deterministic test suite
        run: pnpm test

      - name: Run integration suite
        run: pnpm test:integration

      - name: Run coverage suite
        run: pnpm test:coverage

      - name: Verify route coverage matrix
        run: pnpm test:coverage-matrix

      - name: Run Docker compatibility suite
        if: ${{ inputs.run_compatibility || vars.RELEASE_COMPAT_TESTS_REQUIRED == '1' }}
        env:
          MCPHUB_COMPAT_IMAGE_TAG: latest
          RUN_MCPHUB_COMPAT_TESTS: '1'
        run: pnpm test:compatibility

      - name: Skip Docker compatibility suite
        if: ${{ !(inputs.run_compatibility || vars.RELEASE_COMPAT_TESTS_REQUIRED == '1') }}
        run: echo "Skipping Docker compatibility suite."

      - name: Build clean release artifacts
        run: pnpm build:clean

      - name: Create and audit package tarball
        run: pnpm exec tsx scripts/audit-package.ts --pack --artifacts-dir "$PACK_ARTIFACTS_DIR"

      - name: Validate installed package runtime
        env:
          PACK_ARTIFACTS_DIR: ${{ env.PACK_ARTIFACTS_DIR }}
        run: pnpm exec vitest run -c vitest.package.config.ts

      - name: Run live read-only MCPHub checks
        if: ${{ inputs.run_live_readonly || vars.RELEASE_REAL_TESTS_REQUIRED == '1' }}
        env:
          REAL_TEST_HTTP_AUTH_TOKEN: ${{ secrets.REAL_TEST_HTTP_AUTH_TOKEN }}
          REAL_TEST_MCPHUB_AUTH_HEADER: ${{ secrets.REAL_TEST_MCPHUB_AUTH_HEADER }}
          REAL_TEST_MCPHUB_PROFILE: ${{ secrets.REAL_TEST_MCPHUB_PROFILE }}
          REAL_TEST_MCPHUB_TOKEN: ${{ secrets.REAL_TEST_MCPHUB_TOKEN }}
          REAL_TEST_MCPHUB_TOKEN_KIND: ${{ secrets.REAL_TEST_MCPHUB_TOKEN_KIND }}
          REAL_TEST_MCPHUB_URL: ${{ secrets.REAL_TEST_MCPHUB_URL }}
          RUN_REAL_MCPHUB_TESTS: ${{ vars.RUN_REAL_MCPHUB_TESTS }}
        run: pnpm test:real:readonly

      - name: Skip live read-only MCPHub checks
        if: ${{ !(inputs.run_live_readonly || vars.RELEASE_REAL_TESTS_REQUIRED == '1') }}
        run: echo "Skipping live read-only MCPHub checks."

      - name: Verify npm release dry-run
        run: pnpm publish:dry-run

      - name: Create release PR or publish package
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version:packages
          publish: pnpm release --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Capture current package version
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Decide whether GitHub release creation is needed
        id: release-sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          if gh release view "v$PACKAGE_VERSION" >/dev/null 2>&1; then
            echo "GitHub release v$PACKAGE_VERSION already exists."
            echo "should_create=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node <<'EOF'
          (async () => {
            const packageName = require('./package.json').name;
            const version = process.env.PACKAGE_VERSION;
            const outputPath = process.env.GITHUB_OUTPUT;

            if (!version || !outputPath) {
              console.error('PACKAGE_VERSION and GITHUB_OUTPUT are required.');
              process.exit(1);
            }

            const encodedName = packageName.replace('/', '%2f');
            const encodedVersion = encodeURIComponent(version);
            const registryUrl = `https://registry.npmjs.org/${encodedName}/${encodedVersion}`;

            const response = await fetch(registryUrl, {
              headers: {
                Accept: 'application/json',
              },
            });

            if (response.status === 404) {
              console.log(
                `npm package ${packageName}@${version} is not published yet. Skipping GitHub release creation.`,
              );
              require('node:fs').appendFileSync(outputPath, 'should_create=false\n');
              process.exit(0);
            }

            if (!response.ok) {
              console.error(`Failed to verify npm publication: ${response.status} ${response.statusText}`);
              process.exit(1);
            }

            console.log(`Confirmed npm publication for ${packageName}@${version}.`);
            require('node:fs').appendFileSync(outputPath, 'should_create=true\n');
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Create GitHub release for published version
        if: ${{ steps.release-sync.outputs.should_create == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          gh release create "v$PACKAGE_VERSION" \
            --target "$GITHUB_SHA" \
            --title "v$PACKAGE_VERSION" \
            --generate-notes
